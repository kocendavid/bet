services:
  postgres:
    image: postgres:16
    container_name: ledger-postgres
    environment:
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
      POSTGRES_DB: ledger
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger -d ledger"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - ledger_pg_data:/var/lib/postgresql/data

  ledger:
    build:
      context: .
      dockerfile: ledger-service/Dockerfile
    container_name: ledger-service
    environment:
      DATABASE_URL: postgres://ledger:ledger@postgres:5432/ledger
      LEDGER_LISTEN_ADDR: 0.0.0.0:50051
      RUST_LOG: info
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "50051:50051"

volumes:
  ledger_pg_data:
